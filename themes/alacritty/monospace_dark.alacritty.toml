# Monospace Dark — Alacritty Terminal Theme
# Generated from palette.json
#
# Place this file at:
#   ~/.config/alacritty/themes/monospace-dark.toml
# Then import it in alacritty.toml:
#   import = ["~/.config/alacritty/themes/monospace-dark.toml"]

[colors.primary]
background = "#10151d"
foreground = "#a4afbd"

[colors.cursor]
text   = "#5d6a7d"
cursor = "#c8aaff"

[colors.selection]
text       = "CellForeground"
background = "#264dcb80"

[colors.normal]
black   = "#738295"
red     = "#f76769"
green   = "#17b877"
yellow  = "#ffa23e"
blue    = "#708fff"
magenta = "#a87ffb"
cyan    = "#25a6e9"
white   = "#a4afbd"

[colors.bright]
black   = "#8b98a9"
red     = "#fc8f8e"
green   = "#66ce98"
yellow  = "#ffc26e"
blue    = "#a2b6ff"
magenta = "#c8aaff"
cyan    = "#71c2ee"
white   = "#fafbfe"
